<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>關於我 - 光遇工具站</title>
<style>
    body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: #333; line-height: 1.6; transition: 0.3s; }
    header { text-align: center; background: linear-gradient(135deg, #66a6ff, #89f7fe); color: #fff; padding: 30px 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); position: relative; }
    header h1 { margin: 0; font-size: 28px; letter-spacing: 2px; }
    header p { margin: 5px 0 0; font-size: 14px; opacity: 0.9; }

    .top-controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; align-items: center; }
    .top-left-controls { position: absolute; top: 15px; left: 15px; display: flex; gap: 8px; align-items: center; }
    .lang-label { font-size: 12px; font-weight: bold; color: rgba(255,255,255,0.9); }
    .top-btn, .top-select { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 10px; border-radius: 15px; cursor: pointer; font-size: 12px; transition: 0.2s; outline: none; text-decoration: none; }
    .top-btn:hover, .top-select:hover { background: rgba(0,0,0,0.4); }
    .top-select option { background: #333; color: #fff; }

    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    
    .about-section { background-color: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
    .about-section h2 { text-align: center; margin-top: 0; margin-bottom: 30px; color: #2b5876; font-size: 24px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
    .about-block { margin-bottom: 25px; }
    .about-block h3 { font-size: 18px; color: #444; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .about-block h3::before { content: "✧"; color: #66a6ff; font-size: 20px; }
    .about-block p, .contact-list { margin: 0 0 0 24px; font-size: 15px; color: #555; }
    .about-block a { color: #66a6ff; text-decoration: none; font-weight: bold; }
    .about-block a:hover { text-decoration: underline; }
    .contact-list { list-style: none; padding: 0; }
    .contact-list li { margin-bottom: 5px; }

    /* 黑暗模式 */
    body.dark-mode { background-color: #1a1a1a; color: #ddd; }
    body.dark-mode header { background: linear-gradient(135deg, #1e3c72, #2a5298); }
    body.dark-mode .about-section { background-color: #2a2a2a; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    body.dark-mode .about-section h2 { color: #89f7fe; border-bottom-color: #444; }
    body.dark-mode .about-block h3 { color: #ddd; }
    body.dark-mode .about-block p, body.dark-mode .contact-list { color: #aaa; }
</style>
</head>
<body>

<header>
    <div class="top-left-controls">
        <a href="index.html" class="top-btn" id="ui-back">⬅ 返回首頁</a>
        <span id="ui-lang-label" class="lang-label">語言</span>
        <select id="langSelect" class="top-select" onchange="changeLang()">
            <option value="zh-hant">繁體中文</option>
            <option value="zh">简体中文</option>
            <option value="en">English</option>
        </select>
    </div>

    <h1 id="ui-title">光遇工具站</h1> <p>Sky: Children of the Light Tools</p>
    
    <div class="top-controls">
        <button class="top-btn" onclick="toggleTheme()">🌓 Theme</button>
    </div>
</header>

<div class="container">
    <div class="about-section">
        <h2 id="ui-about">關於此網站</h2>
        <div class="about-block">
            <h3 id="ui-author">關於作者</h3>
            <p id="ui-author-desc">興趣製作，這個網站的目的是提供更簡潔的資訊，幫助光遇的玩家快速了解。</p>
        </div>
        <div class="about-block">
            <h3 id="ui-project">專案網站</h3>
            <p><a href="https://github.com/skydata-lab/skydata" target="_blank" id="ui-github">GitHub 專案 (點擊前往)</a></p>
        </div>
        <div class="about-block">
            <h3 id="ui-contact">聯繫方式</h3>
            <ul class="contact-list">
                <li>📧 <strong id="ui-email">Gmail:</strong> <a href="mailto:adam105915@gmail.com">adam810027@gmail.com</a></li>
                <li>💬 <strong id="ui-discord">Discord:</strong> kernal_314</li>
            </ul>
        </div>
    </div>
</div>

<script>
    // 專屬 about_me.html 的輕量化語言字典
    const uiDict = {
        'zh-hant': {
            'ui-back': '⬅ 返回首頁',
            'ui-lang-label': '語言',
            'ui-title': '光遇工具站',
            'ui-about': '關於此網站',
            'ui-author': '關於作者',
            'ui-author-desc': '興趣製作，這個網站的目的是提供更簡潔的資訊，幫助光遇的玩家快速了解。',
            'ui-project': '專案網站',
            'ui-github': 'GitHub 專案 (點擊前往)',
            'ui-contact': '聯繫方式',
            'ui-email': '電子郵件:',
            'ui-discord': 'Discord:'
        },
        'zh': {
            'ui-back': '⬅ 返回首页',
            'ui-lang-label': '语言',
            'ui-title': '光遇工具站',
            'ui-about': '关于此网站',
            'ui-author': '关于作者',
            'ui-author-desc': '兴趣制作，这个网站的目的是提供更简洁的信息，帮助光遇的玩家快速了解。',
            'ui-project': '项目网站',
            'ui-github': 'GitHub 项目 (点击前往)',
            'ui-contact': '联系方式',
            'ui-email': '电子邮件:',
            'ui-discord': 'Discord:'
        },
        'en': {
            'ui-back': '⬅ Back to Home',
            'ui-lang-label': 'Language',
            'ui-title': 'Sky Tools',
            'ui-about': 'About This Site',
            'ui-author': 'Author',
            'ui-author-desc': 'Created out of interest to provide a clean and quick reference for Sky players.',
            'ui-project': 'Project Links',
            'ui-github': 'GitHub Repository',
            'ui-contact': 'Contact',
            'ui-email': 'Email:',
            'ui-discord': 'Discord:'
        }
    };

    let currentLang = localStorage.getItem('sky_tool_lang') || 'zh-hant';
    
    function init() {
        // 初始化主題
        const theme = localStorage.getItem('sky_tool_theme') || 'light';
        if (theme === 'dark') document.body.classList.add('dark-mode');
        
        // 初始化語言下拉選單
        document.getElementById('langSelect').value = currentLang;
        updateUI();
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('sky_tool_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    function changeLang() {
        currentLang = document.getElementById('langSelect').value;
        localStorage.setItem('sky_tool_lang', currentLang);
        updateUI();
    }

    function updateUI() {
        const texts = uiDict[currentLang];
        // 迴圈遍歷字典並更新對應的 HTML ID 內容
        for (const id in texts) {
            const element = document.getElementById(id);
            if (element) {
                element.textContent = texts[id];
            }
        }
        // 更新 HTML lang 屬性
        document.documentElement.lang = currentLang === 'en' ? 'en' : (currentLang === 'zh' ? 'zh-Hans' : 'zh-Hant');
    }

    // 執行初始化
    init();
</script>
</body>
</html>
